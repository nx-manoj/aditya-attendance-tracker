<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aditya Tracker</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#070B14">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/static/icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <div class="app-wrapper">

        <!-- ── LOGIN ─────────────────────────────────────── -->
        <div id="login-section" class="screen active">
            <div class="login-inner">
                <div class="brand">
                    <div class="brand-icon">
                        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect width="40" height="40" rx="12" fill="url(#brandGrad)"/>
                            <path d="M13 20L18 25L27 15" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <defs>
                                <linearGradient id="brandGrad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
                                    <stop stop-color="#6C63FF"/>
                                    <stop offset="1" stop-color="#3ECFCF"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <h1 class="brand-name">Aditya Tracker</h1>
                    <p class="brand-sub">Smart Attendance Intelligence</p>
                </div>

                <form id="login-form" class="glass-card" autocomplete="off">
                    <div class="field-wrap">
                        <label>SUC Code</label>
                        <div class="field-inner">
                            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            <input type="text" id="suc" placeholder="e.g. 2495850213" required autocomplete="off" spellcheck="false">
                        </div>
                    </div>
                    <div class="field-wrap">
                        <label>Password</label>
                        <div class="field-inner">
                            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                            <input type="password" id="password" placeholder="Your password" required>
                        </div>
                    </div>
                    <button type="submit" class="cta-btn" id="submit-btn">
                        <span id="btn-text">Sync Attendance</span>
                        <div class="btn-loader" id="loader"></div>
                    </button>
                    <p id="error-box" class="error-msg"></p>
                </form>
                <p class="footer-note">Your credentials are never stored locally.</p>
            </div>
        </div>

        <!-- ── RESULTS ──────────────────────────────────── -->
        <div id="results-section" class="screen">
            <!-- top bar -->
            <div class="topbar">
                <button class="icon-btn" id="back-btn" title="Back">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </button>
                <div class="topbar-info">
                    <span id="student-name-display">Student</span>
                    <small id="campus-course-display"></small>
                </div>
                <div class="topbar-badge" id="topbar-badge">—</div>
            </div>

            <!-- big ring -->
            <div class="ring-wrap">
                <svg class="ring-svg" viewBox="0 0 180 180">
                    <circle class="ring-track" cx="90" cy="90" r="78"/>
                    <circle class="ring-fill" id="ring-fill" cx="90" cy="90" r="78" stroke-dasharray="490" stroke-dashoffset="490"/>
                </svg>
                <div class="ring-label">
                    <span id="ring-pct" class="ring-pct">0%</span>
                    <span class="ring-sub" id="ring-sub">0 / 0 Days</span>
                </div>
            </div>

            <!-- cards row -->
            <div class="cards-row">
                <div class="info-card">
                    <p class="card-label">Fee Due</p>
                    <p class="card-val" id="fee-val">₹ —</p>
                </div>
                <div class="info-card" id="status-card">
                    <p class="card-label" id="status-label">Status</p>
                    <p class="card-val" id="status-days">—</p>
                </div>
            </div>

            <!-- action message -->
            <div class="action-glass" id="action-glass">
                <div class="action-dots">
                    <span></span><span></span><span></span>
                </div>
                <p class="action-msg" id="action-msg">Calculating…</p>
            </div>
        </div>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
